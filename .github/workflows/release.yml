name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build
        shell: cmd
        run: call build.bat

      - name: Package
        shell: pwsh
        run: Compress-Archive -Path bin\gangland.exe, README.md -DestinationPath "gangland-${{ github.ref_name }}-win-x64.zip"

      - name: Create release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = "${{ github.ref_name }}"
          $zip = "gangland-$tag-win-x64.zip"
          $notes = "docs/releases/$tag.md"
          if (Test-Path $notes) {
            gh release create $tag $zip --title "Gangland (Text Edition) $tag" --notes-file $notes
          } else {
            gh release create $tag $zip --title "Gangland (Text Edition) $tag" --generate-notes
          }
